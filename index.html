<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
    <title>ToDoApp</title>
</head>
<body>
    <div class="main">
        <!-- Header: Add new todo -->
        <header>
            <div class="add-new-todo">
                <input class="input" type="text" placeholder="new todo...">
                <button class="addBtn" type="button">add</button>
            </div>
            <div class="todos-container">
                <button class="allBtn" type="button">All</button>
                <button class="pendingBtn" type="button">Pending</button>
                <button class="completedBtn" type="button">Completed</button>
            </div>
        </header>
        <!-- Article: List of todos -->
        <article class="article">
            <!-- Section: todo -->
            <!-- <section class="section">
                <h1 class="section-h1">todo item</h1>
                <div class="buttons">
                    <button class="btn-done" type="button">done</button>
                    <button class="btn-delete" type="button">delete</button>
                </div>
            </section> -->
        </article>
        <footer>
            <div class="todo-counter-container">
                <span class="todo-counter">3</span>
                <h1 class="todo-counter-h1">items left</h1>
            </div>
            <button class="btn-deleteAll" type="button">clear all</button>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
